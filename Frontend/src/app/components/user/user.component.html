<div class="login-container">
  <h2>Acceso Dueño</h2>

  <input type="email" [(ngModel)]="usuario" placeholder="Correo (admin@example.com)">
  <input type="password" [(ngModel)]="clave" placeholder="Contraseña (password123)">

  <button (click)="hacerLogin()">Entrar</button>

  <p *ngIf="error" style="color: red;">{{ error }}</p>
</div>
