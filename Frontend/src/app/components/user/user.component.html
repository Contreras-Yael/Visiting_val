<div class="container py-4">
  <div class="card shadow-sm border-0 mx-auto" style="max-width: 500px;">
    <div class="card-body p-4">
      <h3 class="text-center mb-4">Iniciar Sesión</h3>

      <input [(ngModel)]="login_data.email" placeholder="Usuario">
      <input [(ngModel)]="login_data.password" type="password">

      <button (click)="entrar()" class="btn btn-dark btn-lg w-100 mb-4">Iniciar sesion</button>
    </div>
  </div>
</div>
