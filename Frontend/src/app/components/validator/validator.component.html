<div class="container py-4">
  <div class="card shadow-sm border-0 mx-auto" style="max-width: 500px;">
    <div class="card-body p-4">
      <h3 class="text-center mb-4">Validación de Guardia</h3>

      <input type="text" [(ngModel)]="accessCode" class="form-control form-control-lg text-center mb-3" placeholder="VIS-XXXX">

      <button (click)='checkCode()' class="btn btn-dark btn-lg w-100 mb-4">Verificar</button>

      <div *ngIf="errorMessage" class="alert alert-danger text-center">
        {{ errorMessage }}
      </div>

      <div *ngIf="result?.valid" class="card bg-light border-success p-3 text-center">
        <h5 class="text-success">CÓDIGO VÁLIDO</h5>
        <p class="mb-3">Invitado: <strong>{{ result.guestName }}</strong></p>
        <button (click)="confirmEntry()" class="btn btn-success">Registrar Entrada</button>
      </div>
    </div>
  </div>
</div>
